name: 3D Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *" # roda todo dia à meia-noite
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@v0.7.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: felipeliz2
          output: profile-3d-contrib/profile-night-rainbow.svg
          theme: night-rainbow

      - name: Commit 3D graph
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add profile-3d-contrib/profile-night-rainbow.svg
          git commit -m "Update 3D contribution graph" || echo "No changes to commit"
          git push
