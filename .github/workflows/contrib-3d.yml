name: 3D Contribution Graph

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate 3D Contribution Graph
        uses: andrekov/github-profile-3d-contrib@v1.0.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: felipeliz2
          output: profile-3d-contrib/profile-night-rainbow.svg
          theme: night-rainbow

      - name: Commit and push 3D graph
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add profile-3d-contrib/profile-night-rainbow.svg
          git commit -m "Update 3D contribution graph" || echo "No changes to commit"
          git push
