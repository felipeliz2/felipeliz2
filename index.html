<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVES | Studio de Infraestrutura & Design</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <!-- Camada de Luxo: Luz Dinâmica -->
    <div class="cursor-glow"></div>
    <div class="noise-overlay"></div>

    <main class="main-content" data-aos="zoom-out" data-aos-duration="3000">
        <div class="content-box">
            <p class="branding" data-aos="fade-down" data-aos-delay="500">CONSULTORIA DE ELITE — 2026</p>
            
            <h1 data-aos="fade-up" data-aos-delay="800">ALVES</h1>
            <div class="line-sep" data-aos="stretch"></div>
            <h2 data-aos="fade-up" data-aos-delay="1100">Infraestrutura & Design Studio</h2>
            
            <p class="expert-tag" data-aos="fade-in" data-aos-delay="1500">UI/UX Designer • Especialista em Infraestrutura</p>

            <div class="action-section" data-aos="fade-up" data-aos-delay="1800">
                <a href="https://wa.me" class="btn-main">INICIAR PROJETO</a>
                <a href="https://clinicadrapatriciamartins.com.br" class="btn-secondary" target="_blank">Case: Clínica Patrícia Martins →</a>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com"></script>
    <script>
        AOS.init();
        const glow = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.pageX + 'px';
            glow.style.top = e.pageY + 'px';
        });
    </script>
</body>
</html>
