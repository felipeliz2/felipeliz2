<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVES STUDIO | Infra & Design</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <!-- MOTOR DE ÁUDIO (SOM DE AMBIENTE TECH) -->
    <audio id="ambient-sound" loop src="https://codeskulptor-demos.commondatastorage.googleapis.com"></audio>

    <canvas id="matrix-canvas"></canvas>
    <div class="overlay-dark"></div>

    <div class="luxury-wrapper">
        <header>
            <p class="top-tag">ALVES STUDIO — PREMIER CONSULTANCY</p>
            <h1>ALVES <span>INFRA & DESIGN</span></h1>
            <h2>Especialista em Blindagem Digital & UI/UX</h2>
        </header>

        <div class="cta-area">
            <a href="https://wa.me." class="btn-gold" target="_blank">INICIAR CONSULTORIA</a>
            
            <div class="behance-box">
                <a href="https://www.behance.net" target="_blank" class="btn-outline">
                    VER PORTFÓLIO NO BEHANCE
                </a>
            </div>
        </div>
    </div>

    <script>
        // MOTOR DA MATRIX (CHUVA DE CÓDIGO)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ALVESSTUDIO01sudo-systemctl-status-docker-compose-up-ssh-root@vps-n8n-start";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, i) => {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // MOTOR DO SOM (LIGA NO PRIMEIRO CLIQUE)
        document.body.addEventListener('click', function() {
            const audio = document.getElementById('ambient-sound');
            if (audio) {
                audio.volume = 0.15; // Volume sutil de luxo
                audio.play();
            }
        }, { once: true });

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
