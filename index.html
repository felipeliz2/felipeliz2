    <!-- CORREÇÃO 3: Scripts de Movimento (AOS.js completo) -->
    <script src="https://unpkg.com"></script>
    <script>
        AOS.init();
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ALVESINFRA&DESIGN01sudo-systemctl-status-docker-compose-up-ssh-root@vps-n8n-start-npm-run-build-git-commit-ufw-allow-443";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.25)"; // Letras brancas nítidas
            ctx.font = fontSize + "px 'Fira Code', monospace";

            drops.forEach((y, i) => {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
