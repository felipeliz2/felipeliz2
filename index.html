<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVES | Infra & Design Studio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <!-- Fontes e Animações -->
    <link href="https://unpkg.com" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <!-- Camada de Código em Movimento -->
    <div class="code-bg" id="code-bg"></div>
    <div class="overlay-dark"></div>

    <div class="luxury-wrapper" data-aos="zoom-out" data-aos-duration="2000">
        <header>
            <p class="top-tag">EST. 2026 — PREMIER CONSULTANCY</p>
            <h1>ALVES <span>INFRA & DESIGN</span></h1>
            <h2>UI/UX Designer • Especialista em Infraestrutura</h2>
        </header>

        <section class="dev-status">
            <div class="code-line"><span>$</span> sudo systemctl status n8n_vigilancia</div>
            <div class="code-line"><span>$</span> docker-compose up -d --build</div>
        </section>

        <div class="cta-luxury">
            <!-- Link do WhatsApp configurado -->
            <a href="https://wa.me." class="btn-gold" target="_blank">INICIAR CONSULTORIA</a>
            
            <div class="case-study-area">
                <p class="view-label">PROJETOS EM DESTAQUE</p>
                <a href="https://clinicadrapatriciamartins.com.br" class="case-link" target="_blank">
                    <span class="line"></span>
                    <span class="text">VISITAR CLÍNICA PATRÍCIA MARTINS</span>
                    <span class="arrow">→</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        AOS.init();
        
        // Script para Gerar o Fundo de Código Dinâmico
        const codeBg = document.getElementById('code-bg');
        const commands = [
            "npm run build", "docker ps -a", "ssh root@vps_alves", 
            "git commit -m 'elite'", "ufw allow 443", "n8n start",
            "certbot --nginx", "ls -la /var/www", "python3 main.py"
        ];

        function createCodeLine() {
            const line = document.createElement('div');
            line.className = 'scrolling-code';
            line.innerText = commands[Math.floor(Math.random() * commands.length)];
            line.style.left = Math.random() * 100 + "vw";
            line.style.animationDuration = (Math.random() * 5 + 5) + "s";
            line.style.opacity = Math.random() * 0.2;
            codeBg.appendChild(line);
            setTimeout(() => line.remove(), 10000);
        }
        setInterval(createCodeLine, 300);
    </script>
</body>
</html>
